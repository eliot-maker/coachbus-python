<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appel Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-left">{{ eleves|length }} élève(s)</div>
        <div class="header-right">Absences <span class="globe">🌐</span></div>
    </div>

    <div class="list-container">
        {% for eleve in eleves %}
        <div class="row" onclick="location.href='/toggle/{{ eleve.id }}'">
            <div class="name {{ 'is-absent' if eleve.absences == 1 else '' }}">
                {{ eleve.nom }}
            </div>
            <div class="abs-box">
                {{ 'X' if eleve.absences == 1 else '' }}
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="footer">
        <label class="checkbox-container" onclick="if(confirm('Envoyer le PDF par mail ?')) location.href='/terminer_appel'">
            <input type="checkbox" id="finish">
            <span class="checkmark"></span>
            Appel terminé
        </label>
        <div class="status-text">
            ✅ {{ eleves|length }} élèves présents dans la salle
        </div>
    </div>
</div>

</body>
</html>
