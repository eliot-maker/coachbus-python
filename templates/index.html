<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-wrapper">
        <header class="pronote-header">
            <div class="header-left">{{ bus.upper() }}</div>
            <div class="header-mid">ALLER</div>
            <div class="header-right">RETOUR</div>
        </header>

        <main class="list-area">
            {% for eleve in eleves %}
            <div class="row">
                <div class="col-name"><span class="nom">{{ eleve.nom }}</span> {{ eleve.prenom }}</div>
                <div class="col-check {{ 'is-ok' if eleve.present_aller == 1 else 'is-off' }}" onclick="location.href='/toggle/{{ eleve.id }}/{{ bus }}/1'">
                    {{ '✔' if eleve.present_aller == 1 else '' }}
                </div>
                <div class="col-check {{ 'is-ok' if eleve.present_retour == 1 else 'is-off' }}" onclick="location.href='/toggle/{{ eleve.id }}/{{ bus }}/2'">
                    {{ '✔' if eleve.present_retour == 1 else '' }}
                </div>
            </div>
            {% endfor %}
        </main>

        <footer class="dual-footer">
            <button class="f-btn aller" onclick="if(confirm('Envoyer rapport ALLER ?')) location.href='/terminer/{{ bus }}/aller'">
                ALLER ({{ p_aller }})
            </button>
            <button class="f-btn retour" onclick="if(confirm('Valider RETOUR et RESET liste ?')) location.href='/terminer/{{ bus }}/retour'">
                RETOUR ({{ p_retour }})
            </button>
        </footer>
    </div>
</body>
</html>
