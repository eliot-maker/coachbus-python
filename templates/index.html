<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-wrapper">
        <header class="pronote-header">
            <div class="header-left">{{ bus.upper() }} - {{ total }} élèves</div>
            <div class="header-right">Présence <span class="globe">🌐</span></div>
        </header>

        <main class="list-area">
            {% for eleve in eleves %}
            <div class="row {{ 'is-present' if eleve.present == 1 else 'is-absent' }}" onclick="location.href='/toggle/{{ eleve.id }}/{{ bus }}'">
                <div class="col-left">
                    <span class="nom">{{ eleve.nom }}</span>&nbsp;{{ eleve.prenom }}
                </div>
                <div class="col-right">
                    {{ '✔' if eleve.present == 1 else '' }}
                </div>
            </div>
            {% endfor %}
        </main>

        <footer class="pronote-footer" onclick="if(confirm('Envoyer l\'appel ?')) location.href='/terminer/{{ bus }}'">
            <div class="btn-top">
                <div class="check-box">✔</div> <span>Valider l'appel</span>
            </div>
            <div class="btn-bottom">
                <span class="v-mark">✔</span> {{ presents }} présents / {{ total }}
            </div>
        </footer>
    </div>
</body>
</html>
