<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Appel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="window">
    <table class="appel-table">
        <thead>
            <tr>
                <th class="header-name">{{ eleves|length }} élève(s)</th>
                <th class="header-abs">Absences <span class="icon">🌐</span></th>
            </tr>
        </thead>
        <tbody>
            {% for eleve in eleves %}
            <tr onclick="window.location.href='/toggle_absence/{{ eleve.id }}'" style="cursor:pointer;">
                <td class="cell-name {{ 'is-absent' if eleve.absences > 0 else '' }}">
                    {{ eleve.nom }}
                </td>
                <td class="cell-abs">
                    {{ eleve.absences if eleve.absences > 0 else '' }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <div class="status-bar">
        <label><input type="checkbox" checked> Appel terminé</label>
        <div class="status-msg">
            <span class="check-icon">✔️</span> {{ eleves|length }} élèves présents dans la salle
        </div>
    </div>
</div>

</body>
</html>
