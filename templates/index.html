<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appel Bus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <div class="pronote-header">
            <div class="count-box">{{ total }} élève(s)</div>
            <div class="abs-title">Absences <span class="icon">🌐</span></div>
        </div>

        <div class="list-container">
            {% for eleve in eleves %}
            <div class="pronote-row {{ 'is-absent' if eleve.absences == 1 else '' }}" onclick="location.href='/toggle/{{ eleve.id }}'">
                <div class="student-name">
                    <span class="nom-famille">{{ eleve.nom }}</span>&nbsp;{{ eleve.prenom }}
                </div>
                <div class="check-cell">
                    {{ '1' if eleve.absences == 1 else '' }}
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="pronote-footer" onclick="if(confirm('Confirmer l\'envoi du rapport ?')) location.href='/terminer_appel'">
            <div class="footer-content">
                <div class="footer-top">
                    <div class="fake-checkbox">✔</div> 
                    <span>Appel terminé</span>
                </div>
                <div class="footer-bottom">
                    <span class="check-green">✔</span> 
                    <span class="counter-text">{{ presents }} élèves présents dans le bus</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
