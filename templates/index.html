<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appel Bus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-wrapper">
        <header class="pronote-header">
            <div class="count">{{ total }} élève(s)</div>
            <div class="title">Absences <span class="globe">🌐</span></div>
        </header>

        <main class="list-area">
            {% for eleve in eleves %}
            <div class="row {{ 'is-absent' if eleve.absences == 1 else '' }}" onclick="location.href='/toggle/{{ eleve.id }}'">
                <div class="name-col">
                    <strong>{{ eleve.nom }}</strong>&nbsp;{{ eleve.prenom }}
                </div>
                <div class="check-col">
                    {{ '1' if eleve.absences == 1 else '' }}
                </div>
            </div>
            {% endfor %}
        </main>

        <footer class="pronote-footer" onclick="if(confirm('Confirmer l\'envoi de l\'appel ?')) location.href='/terminer_appel'">
            <div class="btn-top">
                <div class="box-check">✔</div>
                <span>Appel terminé</span>
            </div>
            <div class="btn-bottom">
                <span class="badge-v">✔</span> {{ presents }} élèves présents dans le bus
            </div>
        </footer>
    </div>
</body>
</html>
