<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix du bus</title>
    <style>
        body { font-family: system-ui; background: #f9fafb; margin: 0; display: flex; align-items: center; min-height: 100vh; }
        .container { max-width: 400px; margin: auto; padding: 20px; width: 100%; }
        .btn { display: block; width: 100%; padding: 28px; font-size: 28px; font-weight: bold; border: none; border-radius: 24px; margin-bottom: 20px; cursor: pointer; }
        .bus1 { background: #10b981; color: white; }
        .bus2 { background: #3b82f6; color: white; }
        h2 { text-align: center; margin-bottom: 30px; }
        .logout { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bonjour {{ session.user_name }}</h2>
    <p style="text-align:center; color:#4b5563;">Choisissez le bus :</p>
    <a href="{{ url_for('coach_appel', bus_num=1) }}" style="text-decoration:none;"><button class="btn bus1">🚌 BUS 1</button></a>
    <a href="{{ url_for('coach_appel', bus_num=2) }}" style="text-decoration:none;"><button class="btn bus2">🚌 BUS 2</button></a>
    <div class="logout"><a href="{{ url_for('logout') }}" style="color:#6b7280;">Se déconnecter</a></div>
</div>
</body>
</html>
