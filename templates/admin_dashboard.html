<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: system-ui; background: #f9fafb; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; padding: 24px; }
        .btn { display: block; padding: 24px; margin-bottom: 16px; border-radius: 24px; text-decoration: none; color: white; font-weight: bold; font-size: 20px; text-align: center; }
        .btn.enfants { background: #6366f1; }
        .btn.rapports { background: #10b981; }
        h2 { text-align: center; }
        .logout { text-align: center; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Admin · {{ session.user_name }}</h2>
    <a href="{{ url_for('admin_enfants') }}" class="btn enfants">👥 Gérer les enfants</a>
    <a href="{{ url_for('admin_rapports') }}" class="btn rapports">📊 Rapports du jour</a>
    <div class="logout"><a href="{{ url_for('logout') }}">Déconnexion</a></div>
</div>
</body>
</html>
