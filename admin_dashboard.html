<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration · CoachBus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; padding: 1.5rem; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .logo { font-weight: 600; font-size: 22px; color: #1e293b; }
        .card { background: white; border-radius: 24px; padding: 2rem 1.8rem; margin-bottom: 1rem; border: 1px solid #eef2f6; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
        .btn { display: block; padding: 1.2rem; border-radius: 20px; text-decoration: none; font-weight: 600; text-align: center; margin-bottom: 12px; }
        .btn-primary { background: #1a2e4d; color: white; }
        .btn-secondary { background: white; color: #1e293b; border: 1.5px solid #e2e8f0; }
        .logout { color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span class="logo">🚌 CoachBus Admin</span>
        <a href="{{ url_for('logout') }}" class="logout">Déconnexion</a>
    </div>
    <div class="card">
        <h2 style="margin-bottom:1.5rem; font-weight:600;">Bienvenue {{ session.user_name }}</h2>
        <a href="{{ url_for('admin_enfants') }}" class="btn btn-primary">👥 Gérer les enfants</a>
        <a href="{{ url_for('admin_rapports') }}" class="btn btn-secondary">📋 Rapports du jour</a>
    </div>
</div>
</body>
</html>
