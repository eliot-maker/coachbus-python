<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · CoachBus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #eef2f6;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .logo-icon {
            background: #1a2e4d;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.5px;
        }
        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 15px;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            transition: border 0.15s, box-shadow 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #1a2e4d;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover {
            background: #0f1e2f;
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 14px;
        }
        .info-note {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-icon">🚌</div>
        <span class="logo-text">CoachBus</span>
    </div>
    <h2>Connexion</h2>
    <p class="subtitle">Entrez votre identifiant personnel</p>
    <form method="POST">
        <div class="input-group">
            <label>Identifiant</label>
            <input type="text" name="identifiant" placeholder="ex: marie, julien" autofocus required>
        </div>
        <button type="submit" class="btn">Accéder à l'application</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
            <div class="error-message">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    <div class="info-note">superadmin · marie (admin) · julien (coach)</div>
</div>
</body>
</html>
