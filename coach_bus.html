<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix du bus · CoachBus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            border: 1px solid #eef2f6;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 20px;
            color: #1e293b;
        }
        .logout {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .welcome {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #64748b;
            margin-bottom: 2.5rem;
        }
        .bus-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .bus-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1.5rem;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .bus-1 {
            background: #0f766e;
        }
        .bus-2 {
            background: #1d4ed8;
        }
        .bus-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🚌 CoachBus</div>
        <a href="{{ url_for('logout') }}" class="logout">Déconnexion</a>
    </div>
    <div class="welcome">Bonjour {{ session.user_name }}</div>
    <p class="sub">Sélectionnez le bus que vous accompagnez aujourd'hui.</p>
    <div class="bus-grid">
        <a href="{{ url_for('coach_appel', bus_num=1) }}" class="bus-btn bus-1">
            <span>🚌</span> Bus 1
        </a>
        <a href="{{ url_for('coach_appel', bus_num=2) }}" class="bus-btn bus-2">
            <span>🚌</span> Bus 2
        </a>
    </div>
    <div class="footer"></div>
</div>
</body>
</html>
